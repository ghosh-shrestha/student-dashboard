<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="hd"><h2>Dashboard</h2></div>
            <ul>
                <li class="active"><a href="#">Home</a></li>
                <li><a href="#">Students</a></li>
                <li><a href="#">Attendance</a></li>
                <li><a href="#">Marks</a></li>
            </ul>
        </nav>
        <div class="main">
            <div class="header">
                 <div class="tittle">Welcome to Student Dashboard</div>
                 <div class="profile" style="font-size: 15px; font-style: italic;">Adrija Ghosh
                    <img src="https://i.pravatar.cc/40?img=5">
                </div>
            </div>
            <div class="cards">
                <div class="card blue">
                    <h2>120</h2>
                    <p>Total Students</p>
                </div>
                <div class="card red">
                    <h2>80%</h2>
                    <p>Attendance</p>
                </div>
                <div class="card orange">
                    <h2>78</h2>
                    <p>Average Students</p>
                </div>
            </div>


            <div class="content">
                <div class="hd">
                    <div class="head">Bar Chart</div>
                    <div class="marks">&mdash; Marks</div>
                </div>
                <section>
                    <div class="box">
                        <div class="skill">
                            <div class="graph">
                                <div class="percent" style="width: 90%;">90%</div>
                            </div>
                                <div class="name">Math</div>
                        </div>
                        <div class="skill">
                            <div class="graph" >
                                <div class="percent" style="width: 83%;">83%</div>
                            </div>
                                <div class="name">Physics</div>
                        </div>

                        <div class="skill">
                            <div class="graph">
                                <div class="percent" style="width: 92%;">92%</div>
                            </div>
                                <div class="name">Chem</div>
                        </div>  
                    </div>
                </section>
            </div> 
            
        </div>
    </div>
    
</body>
</html
